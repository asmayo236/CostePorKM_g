<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CostePorKm - Comparador Real</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        input[type="range"] { -webkit-appearance: none; appearance: none; background: transparent; cursor: pointer; }
        input[type="range"]::-webkit-slider-runnable-track { background: #e5e7eb; height: 0.5rem; border-radius: 0.5rem; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; margin-top: -4px; background-color: #10b981; height: 1rem; width: 1rem; border-radius: 1rem; }
        .accent-red::-webkit-slider-thumb { background-color: #ef4444; }
    </style>
</head>
<body class="bg-[#F8F9FA] text-[#212529]">
    <div id="app">
        <!-- El contenido se genera dinámicamente con JS para mantener la lógica -->
    </div>

    <script>
        // Lógica de la aplicación en JS puro para el archivo standalone
        const state = {
            annualKm: 15000,
            fuelPrice: 1.70,
            electricityPrice: 0.20,
            publicChargingPrice: 0.45,
            homeChargingPercent: 80,
            electricCar: {
                name: 'Tesla Model 3 (RWD)',
                consumption: 15.5,
                maintenance: 300,
                image: 'https://images.unsplash.com/photo-1560958089-b8a1929cea89?auto=format&fit=crop&q=80&w=800'
            },
            combustionCar: {
                name: 'BMW 320i',
                consumption: 7.2,
                maintenance: 800,
                image: 'https://images.unsplash.com/photo-1555215695-3004980ad54e?auto=format&fit=crop&q=80&w=800'
            }
        };

        function calculate() {
            const effectiveElec = (state.electricityPrice * (state.homeChargingPercent / 100)) + (state.publicChargingPrice * ((100 - state.homeChargingPercent) / 100));
            
            const eCost100 = state.electricCar.consumption * effectiveElec;
            const eAnnual = (eCost100 * state.annualKm / 100) + state.electricCar.maintenance;
            
            const cCost100 = state.combustionCar.consumption * state.fuelPrice;
            const cAnnual = (cCost100 * state.annualKm / 100) + state.combustionCar.maintenance;

            return {
                eCost100, eAnnual, eTotal5: eAnnual * 5,
                cCost100, cAnnual, cTotal5: cAnnual * 5,
                isElectricCheaper: eAnnual < cAnnual,
                diffAnnual: Math.abs(eAnnual - cAnnual),
                diff5: Math.abs(eAnnual * 5 - cAnnual * 5)
            };
        }

        function render() {
            const res = calculate();
            const app = document.getElementById('app');
            
            app.innerHTML = `
                <header class="bg-white border-b border-gray-100 py-6 sticky top-0 z-30">
                    <div class="max-w-5xl mx-auto px-4 flex items-center justify-between">
                        <h1 class="text-2xl font-bold text-gray-900">CostePorKm</h1>
                        <p class="text-sm text-gray-500 italic hidden sm:block">"Lo que realmente vas a pagar"</p>
                    </div>
                </header>

                <main class="max-w-5xl mx-auto px-4 py-8 space-y-12">
                    <!-- Resumen -->
                    <div class="p-6 rounded-2xl flex flex-col sm:flex-row items-center justify-between gap-4 border shadow-sm ${res.isElectricCheaper ? 'bg-emerald-50 border-emerald-100' : 'bg-red-50 border-red-100'}">
                        <div class="flex items-center gap-4">
                            <div class="p-3 rounded-full ${res.isElectricCheaper ? 'bg-emerald-500' : 'bg-red-500'} text-white font-bold">
                                ${res.isElectricCheaper ? '↓' : '↑'}
                            </div>
                            <div>
                                <h3 class="text-lg font-bold">El ${res.isElectricCheaper ? 'Eléctrico' : 'Combustión'} es más rentable</h3>
                                <p class="text-sm text-gray-600">Ahorras <b>${Math.round(res.diffAnnual).toLocaleString()} €</b> al año</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-xs uppercase font-bold text-gray-400 tracking-widest">Ahorro a 5 años</p>
                            <p class="text-3xl font-black ${res.isElectricCheaper ? 'text-emerald-600' : 'text-red-600'}">${Math.round(res.diff5).toLocaleString()} €</p>
                        </div>
                    </div>

                    <!-- Tarjetas -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        ${renderCard(state.electricCar, res.eCost100, res.eAnnual, res.isElectricCheaper, true)}
                        ${renderCard(state.combustionCar, res.cCost100, res.cAnnual, !res.isElectricCheaper, false)}
                    </div>

                    <!-- Configuración -->
                    <section class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                        <h2 class="font-bold text-xl mb-8">Personaliza tu comparativa</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8">
                            ${renderSlider('Kilómetros anuales', 'annualKm', state.annualKm, 5000, 50000, 1000, 'km')}
                            ${renderSlider('Precio Combustible (€/L)', 'fuelPrice', state.fuelPrice, 1, 2.5, 0.01, '€', 'accent-red')}
                            ${renderSlider('Precio Luz Casa (€/kWh)', 'electricityPrice', state.electricityPrice, 0.05, 0.4, 0.01, '€')}
                            ${renderSlider('% Carga en casa', 'homeChargingPercent', state.homeChargingPercent, 0, 100, 5, '%')}
                        </div>
                    </section>
                </main>
            `;
        }

        function renderCard(car, cost100, annual, isCheaper, isElectric) {
            return `
                <div class="bg-white rounded-3xl overflow-hidden shadow-sm border ${isCheaper ? 'ring-2 ring-emerald-500 border-transparent' : 'border-gray-100'}">
                    <div class="h-40 bg-gray-200 relative">
                        <img src="${car.image}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/40 flex items-end p-6">
                            <h4 class="text-white font-bold text-lg">${car.name}</h4>
                        </div>
                    </div>
                    <div class="p-8 space-y-4">
                        <div>
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Coste por 100 km</p>
                            <p class="text-3xl font-black ${isCheaper ? 'text-emerald-600' : 'text-gray-900'}">${cost100.toFixed(2)} €</p>
                        </div>
                        <div class="pt-4 border-t border-gray-50 flex justify-between items-center">
                            <span class="text-xs font-bold text-gray-500 uppercase">Total Anual</span>
                            <span class="text-xl font-black">${Math.round(annual).toLocaleString()} €</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderSlider(label, key, value, min, max, step, unit, accentClass = '') {
            return `
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <label class="text-sm font-bold text-gray-700">${label}</label>
                        <span class="text-emerald-600 font-bold">${value.toLocaleString()} ${unit}</span>
                    </div>
                    <input type="range" min="${min}" max="${max}" step="${step}" value="${value}" 
                        oninput="updateState('${key}', this.value)" class="w-full ${accentClass}">
                </div>
            `;
        }

        window.updateState = (key, val) => {
            state[key] = parseFloat(val);
            render();
        };

        render();
    </script>
</body>
</html>
